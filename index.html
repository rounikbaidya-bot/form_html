<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
   <div class="content">
    <h1>Simple contact form</h1>
    <form action="">
        <label for="fname">First name</label>
        <input type="text" name="fname" itemref="fname" placeholder="first name">
        <label for="lname">Last name</label>
        <input type="text" name="lname" id="lname" placeholder="last name">
        <label for="mail">Email</label>
        <input type="email" name="mail" id="mail" placeholder="lorem@gmail.com">
        <label for="phoen">Phone number</label>
        <input type="text" name="phone" id="phone" placeholder="phone number">
        <label for="city">City</label>
        <input type="text" name="city" id="city" placeholder="city">
        <label for="msg">Message</label>
        <textarea name="msg" id="msg" placeholder="message" rows="5"></textarea>
        <input type="submit" value="Send" class="btn">
    </form>
   </div>
</body>

</html>
